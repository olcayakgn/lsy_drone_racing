name: Online Competition

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  online-competition:
    # Skip this job if running on the main repo to prevent failing CI/CD. Only run on student forks.
    if: ${{ github.repository != 'utiasDSL/lsy_drone_racing' }}

    runs-on: ubuntu-latest

    steps:
      - name: Send Dispatch to Central Repo
        run: |
          # Notice the URL now ends with /competition.yaml/dispatches
          curl -L --fail-with-body -sS -X POST "https://api.github.com/repos/utiasDSL/lsy_drone_racing/actions/workflows/competition.yaml/dispatches" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
          -d '{
            "ref": "competition",
            "inputs": {
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
          }'